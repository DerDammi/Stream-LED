<!doctype html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Login</title><link rel="stylesheet" href="/styles.css"></head><body><main class="container" style="max-width:520px;padding-top:12vh"><section class="card"><h1>Streamlight Login</h1><p class="muted">Lokaler Passwortschutz fürs UI.</p><label>Passwort<input id="password" type="password" /></label><div class="actions"><button onclick="login()">Anmelden</button></div><p id="msg" class="muted small"></p></section></main><script>async function login(){const r=await fetch('/api/session/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.getElementById('password').value})});const d=await r.json();if(r.ok) location.href='/'; else document.getElementById('msg').textContent=d.error||'Login fehlgeschlagen';}document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')login()})</script></body></html>
